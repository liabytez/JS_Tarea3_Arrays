<body>
    <script>
        const precios = [12.5, 8.99, 45.0, 3.25, 22.8];
        const total = precios.reduce(
            (acumulador, precio) => acumulador + precio, 0
        );
        console.log("Total:", total.toFixed(2));
    </script>
